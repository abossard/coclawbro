name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore

  build:
    name: Build (${{ matrix.rid }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar
          - rid: linux-arm64
            os: ubuntu-latest
            archive: tar
            cross: true
          - rid: linux-arm
            os: ubuntu-latest
            archive: tar
            cross: true
          - rid: osx-x64
            os: macos-latest
            archive: tar
          - rid: osx-arm64
            os: macos-latest
            archive: tar
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: win-arm64
            os: windows-latest
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Zig cross-linker
        if: matrix.cross
        run: |
          ZIG_VERSION=0.13.0
          curl -sSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          WRAPPER_DIR="$(pwd)/.zig-wrapper"
          mkdir -p "$WRAPPER_DIR"
          cat > "$WRAPPER_DIR/clang" << 'ZIGWRAP'
          #!/bin/bash
          filtered=(-Wl,-u,__Module)
          for arg in "$@"; do
            case "$arg" in
              -Wl,--discard-all) filtered+=("-Wl,--as-needed") ;;
              -Wl,-pie|-pie|-Wl,-e0x0) ;;
              -fuse-ld=*|-gz=*) ;;
              --target=armv7-linux-gnueabihf) filtered+=("--target=arm-linux-gnueabihf.2.35") ;;
              *) filtered+=("$arg") ;;
            esac
          done
          exec zig cc "${filtered[@]}"
          ZIGWRAP
          chmod +x "$WRAPPER_DIR/clang"
          echo "$WRAPPER_DIR" >> "$GITHUB_PATH"

      - name: Publish AOT binary
        run: >
          dotnet publish CoClawBro.App/CoClawBro.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -p:StripSymbols=false
          -o publish/

      - name: Package as tar.gz (Linux/macOS)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          cd publish
          chmod +x coclawbro || true
          tar -czf "../coclawbro-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz" .

      - name: Package as zip (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath "coclawbro-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coclawbro-${{ matrix.rid }}
          path: coclawbro-${{ steps.version.outputs.version }}-${{ matrix.rid }}.*
          if-no-files-found: error

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: coclawbro-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: |
          cd artifacts
          sha256sum coclawbro-* | tee SHA256SUMS.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: coclawbro-*
          merge-multiple: true

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker multi-arch image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.major_minor }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
