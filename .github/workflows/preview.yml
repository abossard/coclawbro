name: Preview Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --report-trx --report-trx-filename results.trx

  build:
    name: Build (${{ matrix.rid }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar
          - rid: linux-arm64
            os: ubuntu-latest
            archive: tar
            cross: true
          - rid: linux-arm
            os: ubuntu-latest
            archive: tar
            cross: true
          - rid: osx-x64
            os: macos-latest
            archive: tar
          - rid: osx-arm64
            os: macos-latest
            archive: tar
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: win-arm64
            os: windows-latest
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Get short SHA
        id: version
        shell: bash
        run: echo "version=preview" >> "$GITHUB_OUTPUT"

      - name: Install Zig cross-linker
        if: matrix.cross
        run: |
          ZIG_VERSION=0.13.0
          curl -sSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          WRAPPER_DIR="$(pwd)/.zig-wrapper"
          mkdir -p "$WRAPPER_DIR"
          cat > "$WRAPPER_DIR/clang" << 'ZIGWRAP'
          #!/bin/bash
          filtered=(-Wl,-u,__Module)
          for arg in "$@"; do
            case "$arg" in
              -Wl,--discard-all) filtered+=("-Wl,--as-needed") ;;
              -Wl,-pie|-pie|-Wl,-e0x0) ;;
              -fuse-ld=*|-gz=*) ;;
              --target=armv7-linux-gnueabihf) filtered+=("--target=arm-linux-gnueabihf.2.35") ;;
              *) filtered+=("$arg") ;;
            esac
          done
          exec zig cc "${filtered[@]}"
          ZIGWRAP
          chmod +x "$WRAPPER_DIR/clang"
          echo "$WRAPPER_DIR" >> "$GITHUB_PATH"

      - name: Publish AOT binary
        run: >
          dotnet publish CoClawBro.App/CoClawBro.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishAot=true
          -p:StripSymbols=false
          -o publish/

      - name: Package as tar.gz (Linux/macOS)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          cd publish
          chmod +x coclawbro || true
          tar -czf "../coclawbro-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz" .

      - name: Package as zip (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath "coclawbro-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coclawbro-${{ matrix.rid }}
          path: coclawbro-${{ steps.version.outputs.version }}-${{ matrix.rid }}.*
          if-no-files-found: error

  preview-release:
    name: Update preview release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: coclawbro-*
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        run: |
          cd artifacts
          sha256sum coclawbro-* | tee SHA256SUMS.txt

      - name: Recreate preview release
        run: |
          gh release delete preview --yes --cleanup-tag 2>/dev/null || true
          gh release create preview artifacts/* \
            --title "Preview (latest master)" \
            --notes "⚡ **Automatic preview build** from \`master\` branch.

          Commit: ${{ github.sha }}
          Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          > ⚠️ This is a pre-release build. For stable releases, see the latest [versioned release](../../releases/latest)." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula SHA256s
        run: |
          cd artifacts

          OSX_ARM64=$(grep 'osx-arm64' SHA256SUMS.txt | awk '{print $1}')
          OSX_X64=$(grep 'osx-x64' SHA256SUMS.txt | awk '{print $1}')
          LINUX_X64=$(grep 'linux-x64' SHA256SUMS.txt | awk '{print $1}')
          LINUX_ARM64=$(grep 'linux-arm64' SHA256SUMS.txt | awk '{print $1}')
          LINUX_ARM=$(grep 'linux-arm\.' SHA256SUMS.txt | awk '{print $1}')

          cd ..

          sed -i "s|sha256 \".*\" # osx-arm64|sha256 \"${OSX_ARM64}\" # osx-arm64|" Formula/coclawbro.rb
          sed -i "s|sha256 \".*\" # osx-x64|sha256 \"${OSX_X64}\" # osx-x64|" Formula/coclawbro.rb
          sed -i "s|sha256 \".*\" # linux-x64|sha256 \"${LINUX_X64}\" # linux-x64|" Formula/coclawbro.rb
          sed -i "s|sha256 \".*\" # linux-arm64|sha256 \"${LINUX_ARM64}\" # linux-arm64|" Formula/coclawbro.rb
          sed -i "s|sha256 \".*\" # linux-arm|sha256 \"${LINUX_ARM}\" # linux-arm|" Formula/coclawbro.rb

          echo "Updated Formula/coclawbro.rb:"
          grep 'sha256' Formula/coclawbro.rb

      - name: Commit formula updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/coclawbro.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula SHA256s [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
